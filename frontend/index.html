<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA APOD Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-stars"></div>
    <div class="container">
        <header>
            <h1>Descubra o Universo</h1>
            <p>Insira uma data (ex: seu aniversário) e veja a Imagem Astronômica do Dia da NASA correspondente.</p>
        </header>
        
        <main>
            <form id="apod-form" class="glass-card">
                <div class="input-group">
                    <label for="date-input">Escolha a data:</label>
                    <input type="date" id="date-input" required min="1995-06-16"> <!-- APOD started June 16, 1995 -->
                </div>
                <button type="submit" id="submit-btn">
                    <span>Buscar Imagem</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </form>

            <section id="result-container" class="glass-card hidden">
                <h2 id="apod-title"></h2>
                <p id="apod-date-display" class="date-badge"></p>
                <div class="media-container" id="media-container">
                    <!-- Image or video will be injected here -->
                </div>
                <div class="description-container">
                    <p id="apod-description"></p>
                </div>
                <p id="apod-copyright" class="copyright"></p>
            </section>
            
            <div id="error-message" class="error-card hidden">
                <p id="error-text">Ocorreu um erro ao buscar os dados. Tente novamente.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
